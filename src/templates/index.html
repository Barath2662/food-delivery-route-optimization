<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Route Optimization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚚 Food Delivery Route Optimizer</h1>
            <p class="subtitle">Find the shortest delivery route using multistage graph</p>
        </header>

        <main>
            <!-- Statistics Section -->
            <section class="stats-section">
                <div id="statsContainer" class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalNodes">-</div>
                        <div class="stat-label">Total Nodes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalStages">-</div>
                        <div class="stat-label">Stages</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalEdges">-</div>
                        <div class="stat-label">Routes</div>
                    </div>
                </div>
            </section>

            <!-- Input Section -->
            <section class="input-section">
                <h2>Optimize Your Route</h2>
                <form id="routeForm">
                    <div class="form-group">
                        <label for="source">From (Source Node):</label>
                        <select id="source" name="source" required>
                            <option value="">-- Select Source --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="destination">To (Destination Node):</label>
                        <select id="destination" name="destination" required>
                            <option value="">-- Select Destination --</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Find Optimal Route</button>
                    <button type="reset" class="btn btn-secondary">Clear</button>
                </form>
            </section>

            <!-- Results Section -->
            <section class="results-section">
                <div id="result" class="result-container">
                    <p class="info-text">Enter source and destination to find the optimal route</p>
                </div>
            </section>

            <!-- Route Details Section -->
            <section class="details-section" id="detailsSection" style="display: none;">
                <h2>Route Details</h2>
                <div id="routeDetails" class="route-details">
                    <!-- Route details will be displayed here -->
                </div>
            </section>
        </main>

        <footer>
            <p>© 2025 Food Delivery Route Optimization | Powered by Multistage Graph Algorithm</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
